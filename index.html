<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koko-chan 3D: Tokyo Crossing | Anime Arcade</title>
    <!-- Google Fonts for premium retro-modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Press+Start+2P&family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Three.js CDN for 3D graphics rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <!-- Background decorations (sakura petals container or anime vibe) -->
    <div class="anime-backdrop" style="background-image: url('assets/bg.png');"></div>
    <div class="dark-overlay"></div>

    <!-- Main Game Container -->
    <div id="app-container">
        <!-- Header HUD -->
        <header id="game-header">
            <div class="hud-item" id="score-container">
                <span class="hud-label">PONTOS</span>
                <span class="hud-value" id="current-score">0000</span>
            </div>
            <div id="game-title-mini">KOKO-CHAN 3D!</div>
            <div class="hud-item" id="lives-container">
                <span class="hud-label">VIDAS</span>
                <div class="heart-container" id="hearts">
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                </div>
            </div>
        </header>

        <!-- Canvas Game Container -->
        <div id="canvas-wrapper">
            <!-- Three.js WebGL elements will be inserted here dynamically -->
            <!-- Screens overlays (Start, Game Over, Pause) -->
            <!-- Start Screen -->
            <div id="start-screen" class="overlay-screen active">
                <div class="glow-box">
                    <div class="anime-badge">3D EDITION</div>
                    <h1 class="game-logo">Koko-Chan <span class="sub-logo">Tokyo Crossing 3D</span></h1>
                    
                    <!-- Name Input for Ranking -->
                    <div class="input-group">
                        <label for="player-name" class="input-label">NOME DO GUERREIRO</label>
                        <input type="text" id="player-name" placeholder="DIGITE SEU NOME..." maxlength="10" value="GaloLutador">
                    </div>

                    <!-- Leaderboard Display -->
                    <div class="leaderboard-box">
                        <h3 class="leaderboard-title">🏆 TOP 5 SHOBUN</h3>
                        <div class="leaderboard-list" id="leaderboard-start">
                            <div class="leaderboard-row empty">Nenhum recorde ainda</div>
                        </div>
                    </div>

                    <button id="start-btn" class="anime-btn">COMEÇAR JOGO ⚡</button>
                    <div class="controls-tips">
                        Controles: <kbd>▲</kbd> <kbd>▼</kbd> <kbd>◀</kbd> <kbd>▶</kbd> ou <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd>
                    </div>
                </div>
            </div>

            <!-- Game Over Screen -->
            <div id="game-over-screen" class="overlay-screen">
                <div class="glow-box game-over-box">
                    <div class="anime-badge danger">K.O.</div>
                    <h2 class="game-over-title">FIM DE JOGO</h2>
                    
                    <div class="final-score-display">
                        <div class="score-card">
                            <span class="card-label">Pontos Finais</span>
                            <span class="card-val" id="final-score">0</span>
                        </div>
                        <div class="score-card">
                            <span class="card-label">Novo Recorde?</span>
                            <span class="card-val" id="record-status">Não</span>
                        </div>
                    </div>

                    <!-- Game Over Leaderboard -->
                    <div class="leaderboard-box">
                        <h3 class="leaderboard-title">🏆 RANKING ATUALIZADO</h3>
                        <div class="leaderboard-list" id="leaderboard-over">
                            <!-- Populated in JS -->
                        </div>
                    </div>

                    <button id="restart-btn" class="anime-btn danger-btn">JOGAR NOVAMENTE 🔄</button>
                </div>
            </div>
        </div>

        <!-- Mobile Controls Panel -->
        <div id="mobile-controls">
            <div class="control-row">
                <button class="mobile-btn" id="btn-up">▲</button>
            </div>
            <div class="control-row">
                <button class="mobile-btn" id="btn-left">◀</button>
                <button class="mobile-btn" id="btn-down">▼</button>
                <button class="mobile-btn" id="btn-right">▶</button>
            </div>
        </div>

        <!-- Bottom info / credits -->
        <footer id="game-footer">
            <p>Criado em 3D WebGL • Estilo Anime Voxel</p>
            <button id="mute-btn" class="icon-btn">🔊 Som: Ligado</button>
        </footer>
    </div>

    <!-- Main Game Script -->
    <script src="game.js"></script>
</body>
</html>
